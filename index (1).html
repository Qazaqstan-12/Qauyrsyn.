export default function App() {
  const [activeTab, setActiveTab] = useState('home');
  const [selectedScientist, setSelectedScientist] = useState(null);
  const [selectedClass, setSelectedClass] = useState(null);
  const [selectedFact, setSelectedFact] = useState(null);
  
  // Лекция іздеу стейті
  const [searchQuery, setSearchQuery] = useState('');
  const [activeLecture, setActiveLecture] = useState(lectures[0]);
  const [bookmarks, setBookmarks] = useState(['lec1']);
  const [lectureNotes, setLectureNotes] = useState({
    lec1: 'Орнитология — құстарды зерттейтін ғылым. Археоптерикс өтпелі кезең болып табылады.'
  });
  const [currentNoteText, setCurrentNoteText] = useState('');

  // Тест стейті
  const [selectedVariant, setSelectedVariant] = useState(null);
  const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
  const [userAnswers, setUserAnswers] = useState({});
  const [quizFinished, setQuizFinished] = useState(false);
  const [quizScore, setQuizScore] = useState(0);

  // Видео сабақтар стейті
  const [videoList, setVideoList] = useState(videoLessons);
  const [currentVideo, setCurrentVideo] = useState(videoLessons[0]);
  const [videoPlaying, setVideoPlaying] = useState(false);
  const [newComment, setNewComment] = useState('');

  // 3D Стейт (таңдалған қауырсын бөлігі)
  const [selected3DPart, setSelected3DPart] = useState('calamus');

  // Бағалау журналы стейті
  const [students, setStudents] = useState(initialStudents);
  const [newStudentName, setNewStudentName] = useState('');
  const [newStudentGroup, setNewStudentGroup] = useState('БИО-23-01');
  const [selectedGroupFilter, setSelectedGroupFilter] = useState('All');

  // Хабарламалар (Custom Notifications Toast)
  const [toast, setToast] = useState(null);

  const showToast = (message, type = 'success') => {
    setToast({ message, type });
    setTimeout(() => setToast(null), 3500);
  };

  // Лекция ауысқанда конспект мәтінін жаңарту
  useEffect(() => {
    if (activeLecture) {
      setCurrentNoteText(lectureNotes[activeLecture.id] || '');
    }
  }, [activeLecture]);

  // Конспектті сақтау
  const saveNote = () => {
    if (activeLecture) {
      setLectureNotes({
        ...lectureNotes,
        [activeLecture.id]: currentNoteText
      });
      showToast('Конспект сәтті сақталды!', 'success');
    }
  };

  // Лекцияны бетбелгіге (Bookmark) қосу/алу
  const toggleBookmark = (id) => {
    if (bookmarks.includes(id)) {
      setBookmarks(bookmarks.filter(b => b !== id));
      showToast('Бетбелгілерден өшірілді');
    } else {
      setBookmarks([...bookmarks, id]);
      showToast('Бетбелгілерге қосылды!', 'success');
    }
  };

  // Видеоға пікір қосу
  const handleAddComment = (e) => {
    e.preventDefault();
    if (!newComment.trim()) return;

    const updatedVideoList = videoList.map(v => {
      if (v.id === currentVideo.id) {
        return {
          ...v,
          comments: [...(v.comments || []), { author: "Студент", text: newComment }]
        };
      }
      return v;
    });

    setVideoList(updatedVideoList);
    setCurrentVideo(updatedVideoList.find(v => v.id === currentVideo.id));
    setNewComment('');
    showToast('Пікір сәтті қосылды!', 'success');
  };

  // Тест тапсыру логикасы
  const startQuiz = (variant) => {
    setSelectedVariant(variant);
    setCurrentQuestionIndex(0);
    setUserAnswers({});
    setQuizFinished(false);
    showToast(`${variant.title} басталды! Сәттілік!`, 'success');
  };

  const selectAnswer = (questionIndex, optionIndex) => {
    setUserAnswers({
      ...userAnswers,
      [questionIndex]: optionIndex
    });
  };

  const nextQuestion = () => {
    if (currentQuestionIndex < selectedVariant.questions.length - 1) {
      setCurrentQuestionIndex(currentQuestionIndex + 1);
    } else {
      // Тест соңы, балл есептеу
      let correctCount = 0;
      selectedVariant.questions.forEach((q, idx) => {
        if (userAnswers[idx] === q.answer) {
          correctCount++;

                  <button 
                    type="submit"
                    className="w-full bg-emerald-500 hover:bg-emerald-450 text-slate-950 font-bold py-2.5 rounded-xl transition text-xs shadow-lg shadow-emerald-500/10"
                  >
                    Журналға тіркеу
                  </button>
                </form>
              </div>
            </div>
          </div>
        )}

      </main>

      {/* =======================================================
          МОДАЛДЫ ТЕРЕЗЕЛЕР (БАСТЫ БЕТТЕГІ ҰЯШЫҚТАР ҮШІН)
         ======================================================= */}
      
      {/* Ғалымдар ақпараты */}
      {selectedScientist && (
        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 max-w-md w-full relative animate-scaleUp">
            <button 
              onClick={() => setSelectedScientist(null)}
              className="absolute top-4 right-4 p-1.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-white transition"
            >
              <X className="w-4 h-4" />
            </button>
            <div className="flex gap-3 items-center mb-5">
              <div className="w-12 h-12 bg-emerald-500 text-slate-950 rounded-xl flex items-center justify-center text-lg font-extrabold">
                {selectedScientist.avatar}
              </div>
              <div>
                <h3 className="font-bold text-slate-100 text-base">{selectedScientist.name}</h3>
                <p className="text-[10px] text-emerald-400 font-mono">{selectedScientist.years}</p>
              </div>
            </div>
            <div className="space-y-4 text-xs">
              <div>
                <span className="text-[10px] text-slate-500 uppercase tracking-wider">Негізгі жетістігі:</span>
                <p className="text-slate-200 mt-1 leading-relaxed bg-slate-950 border border-slate-850 p-3 rounded-lg">{selectedScientist.achievement}</p>
              </div>
              <div>
                <span className="text-[10px] text-slate-500 uppercase tracking-wider">Толық өмірбаяны:</span>
                <p className="text-slate-300 mt-1 leading-relaxed">{selectedScientist.bio}</p>
              </div>
            </div>
            
            <div className="mt-6 flex gap-2">
              {scientists.map((sc) => (
                <button
                  key={sc.id}
                  onClick={() => setSelectedScientist(sc)}
                  className={`flex-1 py-1.5 text-[10px] font-bold rounded-lg border transition ${selectedScientist.id === sc.id ? 'bg-emerald-500 border-emerald-500 text-slate-950' : 'bg-slate-800 border-slate-750 text-slate-300 hover:bg-slate-700'}`}
                >
                  {sc.avatar}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Классификация ақпараты */}
      {selectedClass && (
        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 max-w-md w-full relative animate-scaleUp">
            <button 
              onClick={() => setSelectedClass(null)}
              className="absolute top-4 right-4 p-1.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-white transition"
            >
              <X className="w-4 h-4" />
            </button>
            <div className="mb-5">
              <span className="text-[9px] text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded border border-emerald-500/20">
                Биологиялық жүйелеу
              </span>
              <h3 className="font-bold text-slate-100 text-base mt-2">{selectedClass.order}</h3>
            </div>
            <div className="space-y-4 text-xs">
              <div>
                <span className="text-[10px] text-slate-500 uppercase tracking-wider">Ерекше сипаттамасы:</span>
                <p className="text-slate-200 mt-1 leading-relaxed bg-slate-950 border border-slate-850 p-3 rounded-lg">{selectedClass.traits}</p>
              </div>
              <div>
                <span className="text-[10px] text-slate-500 uppercase tracking-wider">Белгілі өкілдері:</span>
                <p className="text-emerald-400 font-semibold mt-1">{selectedClass.examples}</p>
              </div>
            </div>
            
            <div className="mt-6 grid grid-cols-2 gap-2">
              {classification.map((cls, idx) => (
                <button
                  key={idx}
                  onClick={() => setSelectedClass(cls)}
                  className={`py-1.5 px-2 text-[9px] font-medium rounded-lg border transition truncate ${selectedClass.order === cls.order ? 'bg-emerald-500 border-emerald-500 text-slate-950' : 'bg-slate-800 border-slate-750 text-slate-300 hover:bg-slate-700'}`}
                >
                  {cls.order.split(' ')[0]}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Қызықты деректер ақпараты */}
      {selectedFact && (
        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 max-w-md w-full relative animate-scaleUp">
            <button 
              onClick={() => setSelectedFact(null)}
              className="absolute top-4 right-4 p-1.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-white transition"
            >
              <X className="w-4 h-4" />
            </button>
            <div className="mb-4">
              <span className="text-[9px] text-emerald-400 bg-emerald-500/10 px-2.5 py-0.5 rounded border border-emerald-500/20">
                Ғылыми дерек
              </span>
              <h3 className="font-bold text-slate-100 text-base mt-2">{selectedFact.title}</h3>
            </div>
            <div className="text-xs">
              <p className="text-slate-300 leading-relaxed bg-slate-950 border border-slate-850 p-4 rounded-xl">
                {selectedFact.desc}
              </p>
            </div>
            
            <div className="mt-6 flex gap-2">
              {interestingFacts.map((f, idx) => (
                <button
                  key={idx}
                  onClick={() => setSelectedFact(f)}
                  className={`flex-1 py-1.5 text-[10px] font-bold rounded-lg border transition ${selectedFact.title === f.title ? 'bg-emerald-500 border-emerald-500 text-slate-950' : 'bg-slate-800 border-slate-750 text-slate-300 hover:bg-slate-700'}`}
                >
                  Дерек {idx+1}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ТӨМЕНГІ МӘЗІР (Мобильді нұсқа үшін) */}
      <footer className="md:hidden fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 grid grid-cols-5 py-2.5 z-20">
        <button 
          onClick={() => setActiveTab('home')} 
          className={`flex flex-col items-center justify-center transition ${activeTab === 'home' ? 'text-emerald-400 font-bold' : 'text-slate-500'}`}
        >
          <Home className="w-5 h-5" />
          <span className="text-[9px] mt-1">Басты</span>
        </button>

        <button 
          onClick={() => setActiveTab('materials')} 
          className={`flex flex-col items-center justify-center transition ${activeTab === 'materials' ? 'text-emerald-400 font-bold' : 'text-slate-500'}`}
        >
          <BookOpen className="w-5 h-5" />
          <span className="text-[9px] mt-1">Материал</span>
        </button>

        <button 
          onClick={() => setActiveTab('quiz')} 
          className={`flex flex-col items-center justify-center transition ${activeTab === 'quiz' ? 'text-emerald-400 font-bold' : 'text-slate-500'}`}
        >
          <Award className="w-5 h-5" />
          <span className="text-[9px] mt-1">Тест</span>
        </button>

        <button 
          onClick={() => setActiveTab('videos')} 
          className={`flex flex-col items-center justify-center transition ${activeTab === 'videos' ? 'text-emerald-400 font-bold' : 'text-slate-500'}`}
        >
          <Video className="w-5 h-5" />
          <span className="text-[9px] mt-1">Бейне</span>
        </button>

        <button 
          onClick={() => setActiveTab('3d')} 
          className={`flex flex-col items-center justify-center transition ${activeTab === '3d' ? 'text-emerald-400 font-bold' : 'text-slate-500'}`}
        >
          <Layers className="w-5 h-5" />
          <span className="text-[9px] mt-1">3D</span>
        </button>
      </footer>

    </div>
  );
}
